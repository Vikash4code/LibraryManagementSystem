server {
    listen 80;

    # Forward API and docs calls to the backend container.
    # The browser only ever talks to this nginx, so there is no CORS.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /swagger-ui/ {
        proxy_pass http://backend:8080;
    }
    location /v3/api-docs {
        proxy_pass http://backend:8080;
    }

    # Serve the React app; unknown paths fall back to index.html (SPA routing).
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
