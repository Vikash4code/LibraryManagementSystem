spring:
  application:
    name: library-management

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lms_db}
    username: ${SPRING_DATASOURCE_USERNAME:lms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:lms_pass}
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true   # let Hibernate create tables before data.sql runs

  sql:
    init:
      mode: always          # run data.sql seed on startup (inserts are idempotent)

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

# application-specific settings
lms:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-min-256-bits-long-okay}
    expiration-hours: 8
  loan:
    period-days: 7
    fine-per-day: 10
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
